name: Release Turtles against rancher/charts
on:
  workflow_dispatch:
    inputs:
      charts_ref:
        description: "Submit PR against the following rancher/charts branch (e.g. dev-v2.10)"
        required: true
        default: "dev-v2.11"
      prev_turtles:
        description: "Previous Turtles version (e.g. 0.23.0-rc.0)"
        required: true
        default: ""
      new_turtles:
        description: "New Turtles version"
        required: true
        default: ""
      prev_chart:
        description: "Previous Rancher Chart version (e.g. 101.1.0)"
        required: true
        default: ""
      new_chart:
        description: "New Rancher Chart version"
        required: true
        default: ""
      should_replace:
        description: "Should the old Turtles version be replaced/removed? (e.g. true in case of release candidate bumps)"
        required: false
        default: "true"

jobs:
  create-rancher-charts-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
          path: turtles
      - name: Checkout rancher/charts
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
          repository: rancher/charts
          ref: ${{github.event.inputs.charts_ref}}
          path: charts
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.25.*'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt install -y --allow-change-held-packages snapd
          sudo snap install yq --channel=v4/stable
      - name: Run release script
        run: |
          export CHARTS_DIR="${GITHUB_WORKSPACE}/charts"
          ./turtles/.github/scripts/release-against-charts.sh ${{github.event.inputs.prev_turtles}} ${{github.event.inputs.new_turtles}} ${{github.event.inputs.prev_chart}} ${{github.event.inputs.new_chart}} ${{github.event.inputs.should_replace}}
      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.PUSH_TURTLES_FORK_SUBMIT_PRS }}
        working-directory: ./charts/
        run: |
          ../turtles/.github/scripts/create-pr.sh ${{github.event.inputs.charts_ref}} ${{github.event.inputs.new_turtles}} ${{github.event.inputs.new_chart}} charts