name: Test chart verify step

on:
  push:
    tags:
      - "v*-test"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
      CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
      RELEASE_DIR: .cr-release-packages
      TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Create dummy chart package (test only)
        run: |
          mkdir -p ${{ env.RELEASE_DIR }}
          echo "dummy chart content" > /tmp/chart-dummy
          tar -czf ${{ env.RELEASE_DIR }}/rancher-turtles-0.25.99-test.tgz -C /tmp chart-dummy
          echo "Created dummy chart: $(ls ${{ env.RELEASE_DIR }})"

      - name: Install chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          install_only: true

      - name: Prepare environment for chart releaser
        run: |
          echo "CR_OWNER=$(cut -d '/' -f 1 <<< $GITHUB_REPOSITORY)" >> $GITHUB_ENV
          echo "CR_GIT_REPO=$(cut -d '/' -f 2 <<< $GITHUB_REPOSITORY)" >> $GITHUB_ENV
          rm -rf .cr-index
          mkdir -p .cr-index

      - name: Run chart-releaser upload
        run: cr upload --skip-existing -c "$(git rev-parse HEAD)" --generate-release-notes --release-name-template "${{ env.TAG }}" --make-release-latest=false

      - name: "[TEST ONLY] Simulate broken release - delete asset"
        run: |
          CHART_FILE=$(ls ${{ env.RELEASE_DIR }}/*.tgz 2>/dev/null | head -1)
          ASSET_NAME=$(basename "${CHART_FILE}")
          echo "Deleting asset '${ASSET_NAME}' to simulate broken release..."
          gh release delete-asset "${{ env.TAG }}" "${ASSET_NAME}" --yes

      - name: Verify chart asset present (recover if missing)
        run: |
          CHART_FILE=$(ls ${{ env.RELEASE_DIR }}/*.tgz 2>/dev/null | head -1)
          if [ -z "${CHART_FILE}" ]; then
            echo "ERROR: No .tgz chart package found in ${{ env.RELEASE_DIR }}"
            exit 1
          fi
          ASSET_NAME=$(basename "${CHART_FILE}")

          if ! gh release view "${{ env.TAG }}" > /dev/null 2>&1; then
            echo "ERROR: Release '${{ env.TAG }}' not found."
            exit 1
          fi

          FOUND=$(gh release view "${{ env.TAG }}" \
            --json assets \
            --jq ".assets[] | select(.name == \"${ASSET_NAME}\") | .name")

          if [ -z "${FOUND}" ]; then
            echo "Chart asset '${ASSET_NAME}' missing — uploading now..."
            gh release upload "${{ env.TAG }}" "${CHART_FILE}" --clobber
            echo "Upload complete."
          else
            echo "Chart asset '${ASSET_NAME}' confirmed present."
          fi