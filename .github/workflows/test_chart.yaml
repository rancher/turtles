name: Lint and Test Prime and Community Charts

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
  TAG: v0.0.1
  RELEASE_TAG: v0.0.1
  MANIFEST_IMG: controller
  CONTROLLER_IMG: controller
  PULL_POLICY: Never
  RANCHER_VERSION: v2.14.0-alpha13

jobs:
  prime-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.14.3

      - name: setupGo
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build docker image (prime)
        run: make docker-build-prime

      - name: Package operator chart
        run: make release-chart

      - name: Run chart-testing (lint)
        run: make test-chart

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.30.0/kind-$(uname)-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create kind cluster
        run: |
          kind create cluster --name kind \
            --image kindest/node@sha256:4613778f3cfcd10e615029370f5786704559103cf27bef934597ba562b269661 # v1.35

      - name: Display kind version
        run: kind version

      - name: Display docker version
        run: docker version

      - name: Add local docker image
        run: kind load docker-image ${{ env.MANIFEST_IMG }}:${{ env.TAG }}

      - name: Add rancher chart repo
        run: helm repo add rancher-alpha https://releases.rancher.com/server-charts/alpha

      - name: Setup Rancher Private CA
        run: |
          echo "Configuring Private CA Certificate..."
          ./scripts/create-rancher-certs.sh

          echo "Create secrets"
          kubectl create namespace cattle-system
          kubectl -n cattle-system create secret tls tls-rancher-ingress \
            --cert /tmp/rancher-private-ca/tls.crt \
            --key /tmp/rancher-private-ca/tls.key
          kubectl -n cattle-system create secret generic tls-ca \
            --from-file /tmp/rancher-private-ca/cacerts.pem

      - name: Install Rancher
        run: helm install rancher rancher-alpha/rancher --namespace cattle-system --create-namespace --set bootstrapPassword=rancheradmin --set replicas=1 --set hostname="e2e.dev.rancher" --set 'extraEnv[0].name=CATTLE_FEATURES' --set 'extraEnv[0].value=turtles=false' --version ${{ env.RANCHER_VERSION }} --set ingress.tls.source=secret --set privateCA=true --wait

      - name: Wait for rancher-webhook
        run: |
          kubectl --namespace cattle-system wait --for=create deployments/rancher-webhook --timeout=300s
          kubectl --namespace cattle-system wait --for=condition=Available deployment/rancher-webhook --timeout=300s

      - name: Set default registry
        run: |
          kubectl patch setting.management.cattle.io -n cattle-system system-default-registry \
            --type merge \
            --patch '{"value":"registry.suse.com"}'

      - name: Run chart-testing (install)
        run: helm install rancher-turtles out/charts/rancher-turtles/ -n rancher-turtles-system --set namespace=rancher-turtles-system --create-namespace --wait --debug

      - name: Wait for core provider rollout
        run: sleep 30 && kubectl rollout status deployment capi-controller-manager -n cattle-capi-system --timeout=10m
      - name: Check capi-controller-manager image
        run: |
          IMAGE=$(kubectl get deployment capi-controller-manager -n cattle-capi-system -o jsonpath='{.spec.template.spec.containers[0].image}')
          if [[ "$IMAGE" != registry.suse.com/rancher/cluster-api-controller* ]]; then
            echo "capi-controller-manager does not use registry.suse.com/rancher/cluster-api-controller based image"
            exit 1
          fi

      - name: Run chart-testing (un-install)
        run: helm uninstall rancher-turtles -n rancher-turtles-system --cascade foreground --wait --debug --timeout=10m

      - name: Run chart re-install
        run: helm install rancher-turtles out/charts/rancher-turtles/ -n rancher-turtles-system --set namespace=rancher-turtles-system --create-namespace --wait --debug

      - name: Run crust-gather
        if: always()
        continue-on-error: true
        run: make collect-artifacts

      - name: Collect run artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts-prime
          path: _artifacts

  community-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.14.3

      - name: setupGo
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build community docker image
        run: make docker-build-community TAG=${{ env.TAG }}

      - name: Package operator chart
        run: make release-chart

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.30.0/kind-$(uname)-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create kind cluster
        run: |
          kind create cluster --name kind \
            --image kindest/node@sha256:abd489f042d2b644e2d033f5c2d900bc707798d075e8186cb65e3f1367a9d5a1

      - name: Display kind version
        run: kind version

      - name: Display docker version
        run: docker version

      - name: Add local docker image
        run: kind load docker-image ${{ env.MANIFEST_IMG }}:${{ env.TAG }}

      - name: Setup Rancher Private CA
        run: |
          echo "Configuring Private CA Certificate..."
          ./scripts/create-rancher-certs.sh

          echo "Create secrets"
          kubectl create namespace cattle-system
          kubectl -n cattle-system create secret tls tls-rancher-ingress \
            --cert /tmp/rancher-private-ca/tls.crt \
            --key /tmp/rancher-private-ca/tls.key
          kubectl -n cattle-system create secret generic tls-ca \
            --from-file /tmp/rancher-private-ca/cacerts.pem

      - name: Install Rancher
        run: helm repo add rancher-alpha https://releases.rancher.com/server-charts/alpha && helm install rancher rancher-alpha/rancher --namespace cattle-system --create-namespace --set bootstrapPassword=rancheradmin --set replicas=1 --set hostname="e2e.dev.rancher" --set 'extraEnv[0].name=CATTLE_FEATURES' --set 'extraEnv[0].value=turtles=false' --version ${{ env.RANCHER_VERSION }} --set ingress.tls.source=secret --set privateCA=true --wait

      - name: Wait for rancher-webhook
        run: |
          kubectl --namespace cattle-system wait --for=create deployments/rancher-webhook --timeout=300s
          kubectl --namespace cattle-system wait --for=condition=Available deployment/rancher-webhook --timeout=300s

      - name: Install rancher-turtles chart
        run: helm install rancher-turtles out/charts/rancher-turtles/ -n rancher-turtles-system --set namespace=rancher-turtles-system --create-namespace --wait --debug

      - name: Wait for core provider rollout
        run: sleep 30 && kubectl rollout status deployment capi-controller-manager -n cattle-capi-system --timeout=10m

      - name: Check capi-controller-manager image is from kubernetes-sigs (community)
        run: |
          IMAGE=$(kubectl get deployment capi-controller-manager -n cattle-capi-system -o jsonpath='{.spec.template.spec.containers[0].image}')
          if [[ "$IMAGE" != rancher/cluster-api-controller* ]]; then
            echo "capi-controller-manager does not use rancher/cluster-api-controller based image"
            exit 1
          fi

      - name: Run crust-gather
        if: always()
        continue-on-error: true
        run: make collect-artifacts

      - name: Collect run artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts-community
          path: _artifacts
