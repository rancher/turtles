on:
  workflow_call:
    inputs:
      tag:
        type: string
        description: Tag for the release
        required: true

      org:
        type: string
        description: Organization part of the image name
        required: true

      image:
        type: string
        description: Static image value for the build

      release_dir:
        type: string
        description: Directory where release is stored
        default: .cr-release-packages

jobs:
  release:
    name: Create helm release
    runs-on: ubuntu-latest
    env:
      CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: setupGo
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Package operator chart
        run: RELEASE_TAG=${GITHUB_REF##*/} CHART_PACKAGE_DIR=${{ inputs.release_dir }} CONTROLLER_IMG="${{ inputs.org }}/${{ inputs.image }}" ORG=${{ inputs.org }} make release

      - name: Install chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          install_only: true

      - name: Prepare environment for the chart releaser
        run: |
          echo "CR_OWNER=$(cut -d '/' -f 1 <<< $GITHUB_REPOSITORY)" >> $GITHUB_ENV
          echo "CR_GIT_REPO=$(cut -d '/' -f 2 <<< $GITHUB_REPOSITORY)" >> $GITHUB_ENV
          rm -rf .cr-index
          mkdir -p .cr-index

      - name: Create draft release
        run: |
          if gh release view "${{ inputs.tag }}" &>/dev/null; then
            echo "Release '${{ inputs.tag }}' already exists, reusing."
          else
            gh release create "${{ inputs.tag }}" \
              --draft \
              --latest=false \
              --generate-notes \
              --title "${{ inputs.tag }}" \
              --target "$(git rev-parse HEAD)"
          fi

      - name: Upload chart asset
        run: |
          CHART_FILE=$(ls ${{ inputs.release_dir }}/*.tgz 2>/dev/null | head -1)
          if [ -z "${CHART_FILE}" ]; then
            echo "ERROR: No .tgz chart package found in ${{ inputs.release_dir }}"
            exit 1
          fi
          gh release upload "${{ inputs.tag }}" "${CHART_FILE}" --clobber
          echo "Uploaded $(basename ${CHART_FILE})"

      - name: Verify chart asset present
        run: |
          CHART_FILE=$(ls ${{ inputs.release_dir }}/*.tgz | head -1)
          ASSET_NAME=$(basename "${CHART_FILE}")
          FOUND=$(gh release view "${{ inputs.tag }}" \
            --json assets \
            --jq ".assets[] | select(.name == \"${ASSET_NAME}\") | .name")
          if [ -z "${FOUND}" ]; then
            echo "ERROR: Asset '${ASSET_NAME}' still missing after upload. Failing."
            exit 1
          fi
          echo "Asset '${ASSET_NAME}' confirmed present."

      - name: Publish release
        run: gh release edit "${{ inputs.tag }}" --draft=false --latest=false

      - name: Run chart-releaser index
        run: cr index --push --release-name-template "${{ inputs.tag }}"