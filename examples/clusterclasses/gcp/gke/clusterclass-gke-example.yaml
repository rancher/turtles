apiVersion: cluster.x-k8s.io/v1beta2
kind: ClusterClass
metadata:
  name: gcp-gke-example
spec:
  controlPlane:
    templateRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: GCPManagedControlPlaneTemplate
      name: gke-control-plane
  infrastructure:
    templateRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: GCPManagedClusterTemplate
      name: gke-cluster
  workers:
    machinePools:
      - class: default-system
        bootstrap:
          templateRef:
            apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
            kind: GKEConfigTemplate
            name: gke-bootstrap-system
        infrastructure:
          templateRef:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: GCPManagedMachinePoolTemplate
            name: gke-default-system
      - class: default-worker
        bootstrap:
          templateRef:
            apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
            kind: GKEConfigTemplate
            name: gke-bootstrap-worker
        infrastructure:
          templateRef:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: GCPManagedMachinePoolTemplate
            name: gke-default-worker
  variables:
    - name: project
      required: true
      schema:
        openAPIV3Schema:
          description: "The GCP project where the cluster will be created"
          type: string
    - name: region
      required: true
      schema:
        openAPIV3Schema:
          description: "The GCP region where the cluster will be created"
          type: string
          default: us-west1
    - name: networkName
      required: true
      schema:
        openAPIV3Schema:
          description: "The GCP network name"
          type: string
    - name: credentialSecretName
      required: true
      schema:
        openAPIV3Schema:
          description: "Name of the Secret containing GCP credentials for this cluster"
          type: string
    - name: credentialSecretNamespace
      required: true
      schema:
        openAPIV3Schema:
          description: "Namespace of the Secret containing GCP credentials"
          type: string
  patches:
    - name: project
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: GCPManagedClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/project
              valueFrom:
                variable: project
    - name: projectControlPlane
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: GCPManagedControlPlaneTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/project
              valueFrom:
                variable: project
    - name: region
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: GCPManagedClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/region
              valueFrom:
                variable: region
    - name: regionControlPlane
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: GCPManagedControlPlaneTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/location
              valueFrom:
                variable: region
    - name: networkName
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: GCPManagedClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/network/name
              valueFrom:
                variable: networkName
    - name: credentialsRef
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: GCPManagedClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/credentialsRef
              valueFrom:
                template: |
                  name: "{{ .credentialSecretName }}"
                  namespace: "{{ .credentialSecretNamespace }}"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: GCPManagedClusterTemplate
metadata:
  name: gke-cluster
spec:
  template:
    spec:
      project: ""
      region: ""
      network:
        name: ""
      credentialsRef:
        name: ""
        namespace: ""
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: GCPManagedControlPlaneTemplate
metadata:
  name: gke-control-plane
spec:
  template:
    spec:
      project: ""
      location: ""
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: GCPManagedMachinePoolTemplate
metadata:
  name: gke-default-system
spec:
  template:
    spec: {}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: GCPManagedMachinePoolTemplate
metadata:
  name: gke-default-worker
spec:
  template:
    spec: {}
---
# GKEConfigTemplates are the GKE-native bootstrap templates introduced in
# https://github.com/kubernetes-sigs/cluster-api-provider-gcp/pull/1442
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: GKEConfigTemplate
metadata:
  name: gke-bootstrap-system
spec:
  template:
    spec: {}
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: GKEConfigTemplate
metadata:
  name: gke-bootstrap-worker
spec:
  template:
    spec: {}
