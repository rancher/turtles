apiVersion: fleet.cattle.io/v1alpha1
kind: HelmOp
metadata:
  name: calico-crds
spec:
  helm:
    version: v3.32.0
    releaseName: projectcalico
    repo: https://docs.tigera.io/calico/charts
    chart: projectcalico.org.v3
  insecureSkipTLSVerify: true
  targets:
  - clusterSelector:
      matchLabels:
        cni: calico
      matchExpressions:
      - key: clusterclass-name.fleet.addons.cluster.x-k8s.io
        operator: In
        values:
          - azure-rke2-example
          - azure-kubeadm-example
          - docker-kubeadm-example
          - docker-rke2-example
          - docker-rke2-v1beta1-example
          - vsphere-kubeadm-example
          - vsphere-rke2-example
          - gcp-kubeadm-example
---
apiVersion: fleet.cattle.io/v1alpha1
kind: HelmOp
metadata:
  name: calico-cni
spec:
  helm:
    version: v3.32.0
    releaseName: projectcalico
    repo: https://docs.tigera.io/calico/charts
    chart: tigera-operator
    templateValues:
      installation: |-
        cni:
          type: Calico
        calicoNetwork:
          bgp: Disabled
          mtu: 1350
          ipPools:
            ${- range $cidr := .ClusterValues.Cluster.spec.clusterNetwork.pods.cidrBlocks }
            - cidr: "${ $cidr }"
              encapsulation: VXLAN
            ${- end}
        ${- range $variable := .ClusterValues.Cluster.spec.topology.variables }
          ${- if eq $variable.name "imagePullSecret" }
        imagePullSecrets:
        - name: "${ $variable.value }"
          ${- end}
        ${- end } 
  insecureSkipTLSVerify: true
  targets:
  - clusterSelector:
      matchLabels:
        cni: calico
      matchExpressions:
      - key: clusterclass-name.fleet.addons.cluster.x-k8s.io
        operator: In
        values:
          - azure-rke2-example
          - azure-kubeadm-example
          - docker-kubeadm-example
          - docker-rke2-example
          - docker-rke2-v1beta1-example
          - vsphere-kubeadm-example
          - vsphere-rke2-example
          - gcp-kubeadm-example
