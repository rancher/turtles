apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureClusterIdentity
metadata:
  annotations:
    "helm.sh/resource-policy": keep
  labels:
    clusterctl.cluster.x-k8s.io/move-hierarchy: "true"
  name: cluster-identity
  namespace: ${NAMESPACE}
spec:
  allowedNamespaces: {}
  clientID: ${AZURE_CLIENT_ID}
  clientSecret:
    name: cluster-identity-secret
    namespace: capz-system
  tenantID: ${AZURE_TENANT_ID}
  type: ServicePrincipal
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  labels:
    cluster-api.cattle.io/rancher-auto-import: "true"
  name: ${CLUSTER_NAME}
  namespace: ${NAMESPACE}
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - 192.168.0.0/16
  topology:
    classRef:
      name: azure-rke2-example
      namespace: ${TOPOLOGY_NAMESPACE}
    controlPlane:
      replicas: 1
    variables:
      - name: subscriptionID
        value: ${AZURE_SUBSCRIPTION_ID}
      - name: location
        value: germanywestcentral
      - name: resourceGroup
        value: highlander-e2e-azure-rke2
      - name: azureClusterIdentityName
        value: cluster-identity
    version: ${AZURE_RKE2_KUBERNETES_VERSION}
    workers:
      machineDeployments:
        - class: rke2-default-worker
          name: md-0
          replicas: 1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloud-provider-azure
  namespace: ${NAMESPACE}
data:
  cloud-provider-azure.yaml: |-
    apiVersion: helm.cattle.io/v1
    kind: HelmChart
    metadata:
      name: azure-ccm
      namespace: kube-system
    spec:
      repo: https://raw.githubusercontent.com/kubernetes-sigs/cloud-provider-azure/master/helm/repo
      chart: cloud-provider-azure
      bootstrap: true
      version: "${AZURE_CLOUD_PROVIDER_VERSION}"
      targetNamespace: kube-system
      valuesContent: |-
        infra:
          clusterName: ${CLUSTER_NAME}
        cloudControllerManager:
          clusterCIDR: 192.168.0.0/16
---
apiVersion: addons.cluster.x-k8s.io/v1beta2
kind: ClusterResourceSet
metadata:
  name: cloud-provider-azure
  namespace: ${NAMESPACE}
spec:
  strategy: Reconcile
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: '${CLUSTER_NAME}'
  resources:
    - name: cloud-provider-azure
      kind: ConfigMap
