apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: VSphereClusterIdentity
metadata:
  name: cluster-identity
spec:
  secretName: cluster-identity
  allowedNamespaces:
    selector:
      matchLabels: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: '${CLUSTER_NAME}-docker-token'
  namespace: '${NAMESPACE}'
type: Opaque
stringData:
  username: "${DOCKER_REGISTRY_USERNAME}"
  password: "${DOCKER_REGISTRY_TOKEN}"
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: '${CLUSTER_NAME}'
  namespace: '${NAMESPACE}'
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
      - 192.168.0.0/16
  topology:
    classRef:
      name: vsphere-rke2-example
      namespace: ${TOPOLOGY_NAMESPACE}
    version: ${RKE2_KUBERNETES_VERSION}
    controlPlane:
      replicas: ${CONTROL_PLANE_MACHINE_COUNT}
    workers:
      machineDeployments:
      - class: vsphere-rke2-example-worker
        name: md-0
        replicas: ${WORKER_MACHINE_COUNT}
    variables:
    - name: vSphereClusterIdentityName
      value: cluster-identity
    - name: vSphereTLSThumbprint
      value: '${VSPHERE_TLS_THUMBPRINT}'
    - name: vSphereDataCenter
      value: '${VSPHERE_DATACENTER}'
    - name: vSphereDataStore
      value: '${VSPHERE_DATASTORE}'
    - name: vSphereFolder
      value: '${VSPHERE_FOLDER}'
    - name: vSphereNetwork
      value: '${VSPHERE_NETWORK}'
    - name: vSphereResourcePool
      value: '${VSPHERE_RESOURCE_POOL}'
    - name: vSphereServer
      value: '${VSPHERE_SERVER}'
    - name: vSphereTemplate
      value: '${VSPHERE_TEMPLATE}'
    - name: controlPlaneIpAddr
      value: '${VSPHERE_KUBE_VIP_IP_RKE2}'
    - name: controlPlanePort
      value: 6443
    - name: kubeVIPInterface
      value: eth0
    - name: dockerAuthSecret
      value: '${CLUSTER_NAME}-docker-token'
---
### CPI CONFIG ###
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloud-provider-vsphere
  namespace: ${NAMESPACE}
data:
  cloud-provider-vsphere.yaml: |-
    apiVersion: helm.cattle.io/v1
    kind: HelmChart
    metadata:
      name: vsphere-ccm
      namespace: kube-system
    spec:
      repo: https://rke2-charts.rancher.io
      chart: rancher-vsphere-cpi
      bootstrap: true
      targetNamespace: kube-system
      version: "1.14.000"
      valuesContent: |-
        vCenter:
          host: "${VSPHERE_SERVER}"
          datacenters: "${VSPHERE_DATACENTER}"
          credentialsSecret:
            generate: false
            name: cloud-provider-vsphere-credentials
---
apiVersion: v1
kind: Secret
metadata:
  name: cloud-provider-vsphere-credentials
  namespace: ${NAMESPACE}
type: addons.cluster.x-k8s.io/resource-set
stringData:
  cloud-provider-vsphere-credentials.yaml: |-
    apiVersion: v1
    kind: Secret
    type: Opaque
    metadata:
      name: cloud-provider-vsphere-credentials
      namespace: kube-system
    stringData:
      ${VSPHERE_SERVER}.username: "${VSPHERE_USERNAME}"
      ${VSPHERE_SERVER}.password: "${VSPHERE_PASSWORD}"
---
apiVersion: addons.cluster.x-k8s.io/v1beta2
kind: ClusterResourceSet
metadata:
  name: cloud-provider-vsphere
  namespace: ${NAMESPACE}
spec:
  strategy: Reconcile
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: '${CLUSTER_NAME}'
  resources:
    - name: cloud-provider-vsphere
      kind: ConfigMap
    - name: cloud-provider-vsphere-credentials
      kind: Secret
### /CPI CONFIG ###
---
### CSI CONFIG ###
apiVersion: v1
kind: Secret
metadata:
  name: csi-vsphere-config
  namespace: ${NAMESPACE}
type: addons.cluster.x-k8s.io/resource-set
stringData:
  csi-vsphere-config.yaml: |-
    apiVersion: v1
    kind: Secret
    type: Opaque
    metadata:
      name: vsphere-config-secret
      namespace: vmware-system-csi
    stringData:
      csi-vsphere.conf: |+
        [Global]
        thumbprint = "${VSPHERE_TLS_THUMBPRINT}"

        [VirtualCenter "${VSPHERE_SERVER}"]
        user = "${VSPHERE_USERNAME}"
        password = "${VSPHERE_PASSWORD}"
        datacenters = "${VSPHERE_DATACENTER}"

        [Network]
        public-network = "${VSPHERE_NETWORK}"

        [Labels]
        region = ""
        zone = ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: csi-vsphere
  namespace: ${NAMESPACE}
data:
  csi-vsphere.yaml: |-
    apiVersion: helm.cattle.io/v1
    kind: HelmChart
    metadata:
      name: vsphere-csi
      namespace: kube-system
    spec:
      repo: https://rke2-charts.rancher.io
      chart: rancher-vsphere-csi
      bootstrap: true
      targetNamespace: vmware-system-csi
      createNamespace: true
      version: "3.7.0-rancher100"
      valuesContent: |-
        vCenter:
          configSecret:
            generate: false
            name: vsphere-config-secret
---
apiVersion: addons.cluster.x-k8s.io/v1beta2
kind: ClusterResourceSet
metadata:
  name: csi-vsphere
  namespace: ${NAMESPACE}
spec:
  strategy: Reconcile
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: '${CLUSTER_NAME}'
  resources:
    - name: csi-vsphere
      kind: ConfigMap
    - name: csi-vsphere-config
      kind: Secret
###/ CSI CONFIG ###
---
