apiVersion: v1
kind: Secret
metadata:
  name: ${AZURE_ASO_CREDENTIAL_SECRET_NAME}
  namespace: "${NAMESPACE}"
stringData:
  AZURE_SUBSCRIPTION_ID: "${AZURE_SUBSCRIPTION_ID}"
  AZURE_TENANT_ID: "${AZURE_TENANT_ID}"
  AZURE_CLIENT_ID: "${AZURE_CLIENT_ID}"
  AZURE_CLIENT_SECRET: "${AZURE_CLIENT_SECRET}"
type: Opaque
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: ${CLUSTER_NAME}
  namespace: "${NAMESPACE}"
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - 192.168.0.0/16
  topology:
    classRef:
      name: azure-aks-example
      namespace: ${TOPOLOGY_NAMESPACE}
    variables:
      - name: location
        value: germanywestcentral
      - name: resourceGroup
        value: highlander-e2e-azure-aks
      - name: asoCredentialSecretName
        value: ${AZURE_ASO_CREDENTIAL_SECRET_NAME}
    version: ${AZURE_AKS_KUBERNETES_VERSION}
    workers:
      machinePools:
        - class: default-system
          name: system-1
          replicas: 1
        - class: default-worker
          name: worker-1
          replicas: 1
