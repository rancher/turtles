# This is a manifest containing all providers 
# used by the chart upgrade suite.
# Since Rancher (and Turtles) community is installed, 
# we need to explicitly pin the providers versions.
# Keep the versions in sync with the previous version of Turtles.
apiVersion: v1
kind: Namespace
metadata:
  name: rke2-bootstrap-system
---
apiVersion: turtles-capi.cattle.io/v1alpha1
kind: CAPIProvider
metadata:
  name: rke2-bootstrap
  namespace: rke2-bootstrap-system
spec:
  name: rke2
  type: bootstrap
  version: v0.24.3
  fetchConfig:
    oci: registry.rancher.com/rancher/cluster-api-provider-rke2-components:v0.24.3
---
apiVersion: v1
kind: Namespace
metadata:
  name: rke2-control-plane-system
---
apiVersion: turtles-capi.cattle.io/v1alpha1
kind: CAPIProvider
metadata:
  name: rke2-control-plane
  namespace: rke2-control-plane-system
spec:
  name: rke2
  type: controlPlane
  version: v0.24.3
# FIXME: https://github.com/rancher/turtles/issues/2350
#  fetchConfig:
#    oci: registry.rancher.com/rancher/cluster-api-provider-rke2-components:v0.24.3
---
apiVersion: v1
kind: Namespace
metadata:
  name: capd-system
---
apiVersion: turtles-capi.cattle.io/v1alpha1
kind: CAPIProvider
metadata:
  name: docker
  namespace: capd-system
spec:
  type: infrastructure
  version: v1.12.2
# FIXME: https://github.com/rancher/turtles/issues/2352
#  fetchConfig:
#    oci: registry.rancher.com/rancher/cluster-api-controller-components:v1.12.2
