# 1. Run: helm repo add aws-ccm https://kubernetes.github.io/cloud-provider-aws
# 2. Run: helm repo update
# 3. Run: helm template aws-cloud-controller-manager aws-ccm/aws-cloud-controller-manager -f test/e2e/data/applications/cloud-provider-aws-values.yaml > test/e2e/data/applications/cloud-provider-aws-dump.yaml
# 4. Verify the test/e2e/data/applications/cloud-provider-aws-dump.yaml
