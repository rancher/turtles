args:
  - --v=2
  - --cloud-provider=aws
  - --use-service-account-credentials=true
  - --configure-cloud-routes=false
clusterRoleRules:
  - apiGroups:
      - ""
    resources:
      - events
      - nodes
      - nodes/status
      - services
      - services/status
      - serviceaccounts
      - persistentvolumes
      - configmaps
      - serviceaccounts/token
      - endpoints
    verbs:
      - "*"
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - get
      - list
      - watch
      - update