apiVersion: v1
kind: Service
metadata:
  name: rancher-nodeport
  namespace: cattle-system
spec:
  type: NodePort
  selector:
    app: rancher
  ports:
  - nodePort: 30080
    name: http
    port: 80
    protocol: TCP
    targetPort: 80
  - nodePort: 30443
    name: https
    port: 443
    protocol: TCP
    targetPort: 443
