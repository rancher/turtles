# extras: extra providers configuration
extras:
  # addonFleet: extra configuration for CAAPF 
  addonFleet:
    # config: configure the embedded FleetAddonConfig
    config:
      # enabled: enable the embedded FleetAddonConfig
      enabled: true
      # fleetAgentMetricsAddress: sets the default fleet-agent metrics bind address
      fleetAgentMetricsAddress: ":18080"
      # fleetAgentHealthProbeAddress: sets the default fleet-agent health probe bind address
      fleetAgentHealthProbeAddress: ":18081"
  # infrastructureAzure: extra configuration for CAPZ.
  infrastructureAzure:
    # azureServiceOperator: Azure Service Operator overrides.
    azureServiceOperator:
      # container: Provider containers configuration.
      containers:
        # name: Name of the container to override.
      - name: manager
        # image: Container image override.
        image:
          # repository: Image repository override.
          repository: "registry.rancher.com/rancher/azureserviceoperator"
          # tag: Image tag override.
          tag: "v2.13.0"
