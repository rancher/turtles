# Default values for rancher-turtles-providers.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# imagePullSecrets: Secret names to use when pulling images for provider deployments.
imagePullSecrets: []
# imagePullSecrets:
#   - secret1

# providers: Providers configuration.
providers:
  # addonFleet: Cluster API Add-on Provider for Fleet (CAAPF).
  addonFleet:
    # enabled: Enables the installation of this provider.
    enabled: false
    # namespace: The namespace where the provider manifests will be applied.
    namespace: fleet-addon-system
    # enableAutomaticUpdate: Allows the provider to be updated automatically whenever this chart is updated.
    enableAutomaticUpdate: true
    # version: Provider version
    version: "v0.15.0"
    # deployment: Provider Deployment configuration.
    deployment:
      # container: Provider containers configuration.
      containers:
        # name: Name of the container to override.
      - name: manager
        # image: Container image override.
        image:
          # repository: Image repository override.
          repository: "registry.rancher.com/rancher/cluster-api-addon-provider-fleet"
          # tag: Image tag override.
          tag: "v0.15.0"
  # features: Optional feature flags for this provider.
  # features:
  #   machinePool: false
  #   clusterResourceSet: false
  #   clusterTopology: false
  # variables: Optional environment variables exposed to the controller manager.
  # variables:
  #   ENV_VAR: "value"
  # configSecret: ConfigSecret is the object with name and namespace of the Secret providing the configuration variables for the current provider instance, like e.g. credentials.
  # configSecret:
  #   name: ""
  #   namespace: ""
  # fetchConfig: Override default artifact source via URL or OCI (specify one).
    fetchConfig:
      url: "https://github.com/rancher/cluster-api-addon-provider-fleet/releases/v0.15.0/addon-components.yaml"
  #   # oci: "ghcr.io/<org>/<artifact>:<tag>"
  # manager: Optional controller manager settings.
  # manager:
  #   syncPeriod: "5m"
  #   verbosity: 5
  # bootstrapKubeadm: Kubeadm Bootstrap Provider.
  bootstrapKubeadm:
    # enabled: Enables the installation of this provider.
    enabled: false
    # namespace: The namespace where the provider manifests will be applied.
    namespace: capi-kubeadm-bootstrap-system
    # enableAutomaticUpdate: Allows the provider to be updated automatically whenever this chart is updated.
    enableAutomaticUpdate: true
    # version: Provider version
    version: "v1.13.3"
    # deployment: Provider Deployment configuration.
    deployment:
      # container: Provider containers configuration.
      containers:
        # name: Name of the container to override.
      - name: manager
        # image: Container image override.
        image:
          # repository: Image repository override.
          repository: "registry.rancher.com/rancher/kubeadm-bootstrap-controller"
          # tag: Image tag override.
          tag: "v1.13.3"
  # features: Optional feature flags for this provider.
  # features:
  #   machinePool: false
  #   clusterResourceSet: false
  #   clusterTopology: false
